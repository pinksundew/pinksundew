name: Release-plz

on:
  push:
    branches:
      - main
    paths:
      - mcp-server-rust/**
      - Cargo.toml
      - Cargo.lock
      - release-plz.toml
      - .github/workflows/release-plz.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  release-plz-release:
    name: Release
    runs-on: ubuntu-latest
    needs: release-plz-pr
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Snapshot release tags
        run: |
          git ls-remote --tags --refs origin "v*" \
            | awk '{print $2}' \
            | sed 's#refs/tags/##' \
            | sort > "$RUNNER_TEMP/release-tags-before.txt"
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Find created release tag
        id: release-tag
        run: |
          git fetch --tags origin
          git tag -l "v*" | sort > "$RUNNER_TEMP/release-tags-after.txt"
          tag="$(comm -13 "$RUNNER_TEMP/release-tags-before.txt" "$RUNNER_TEMP/release-tags-after.txt" | sort -V | tail -n 1)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Publish MCP release artifacts
        if: ${{ steps.release-tag.outputs.tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
        run: gh workflow run mcp-release.yml --ref main -f tag="${{ steps.release-tag.outputs.tag }}"
