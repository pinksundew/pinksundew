name: Publish MCP Package

on:
  push:
    branches:
      - main
    paths:
      - mcp-server/**
      - .github/workflows/publish-mcp.yml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Resolve publish target
        id: package
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION is already published for $PACKAGE_NAME."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION is new and will be published."
          fi

      - name: Publish package
        if: steps.package.outputs.publish == 'true'
        run: npm publish --provenance