name: Release Rust MCP Binaries

on:
  push:
    tags:
      - mcp-v*
  workflow_dispatch:

jobs:
  build-and-upload:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: mcp-server-rust
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mcp-server-rust

      - name: Install cargo-dist
        run: cargo install cargo-dist --locked

      - name: Install cross for Linux ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Validate dist config
        run: cargo dist plan

      - name: Build release binary
        shell: bash
        run: |
          if [ \"${{ matrix.target }}\" = \"aarch64-unknown-linux-gnu\" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare release asset (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ../release-assets
          cp target/${{ matrix.target }}/release/pinksundew-mcp ../release-assets/pinksundew-mcp-${{ matrix.target }}

      - name: Prepare release asset (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ..\release-assets | Out-Null
          Copy-Item target\${{ matrix.target }}\release\pinksundew-mcp.exe ..\release-assets\pinksundew-mcp-${{ matrix.target }}.exe

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/pinksundew-mcp-${{ matrix.target }}${{ matrix.ext }}
          generate_release_notes: true
